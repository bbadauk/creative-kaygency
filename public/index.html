const AuthContext = createContext();
const CurrencyContext = createContext();
const NotificationContext = createContext();

function AuthProvider({ children }) {
  const [user, setUser] = useState(() => {
    try { const u = localStorage.getItem('ck_user'); return u ? JSON.parse(u) : null; } catch { return null; }
  });
  const [projects, setProjects] = useState(() => {
    try { const p = localStorage.getItem('ck_projects'); return p ? JSON.parse(p) : DEMO_PROJECTS; } catch { return DEMO_PROJECTS; }
  });

  useEffect(() => {
    if (user) localStorage.setItem('ck_user', JSON.stringify(user));
    else localStorage.removeItem('ck_user');
  }, [user]);
  useEffect(() => { localStorage.setItem('ck_projects', JSON.stringify(projects)); }, [projects]);

  const login = (email, password) => {
    const demoKey = Object.keys(DEMO_USERS).find(k => DEMO_USERS[k].email === email && DEMO_USERS[k].password === password);
    if (demoKey) { setUser(DEMO_USERS[demoKey]); return { success: true, user: DEMO_USERS[demoKey] }; }
    return { success: false, error: 'Invalid email or password' };
  };
  const register = (name, email, password, referralCode) => {
    const newUser = { id: 'usr_' + Date.now(), name, email, password, credits: referralCode ? 50 : 0, plan: null, streak: 0, badges: ['first-login'], referralCode: 'REF' + Date.now().toString(36).toUpperCase(), referrals: 0, projectsCompleted: 0, joinDate: new Date().toISOString().split('T')[0] };
    setUser(newUser);
    return { success: true, user: newUser };
  };
  const logout = () => { setUser(null); setProjects(DEMO_PROJECTS); };
  const updateCredits = (amount) => setUser(u => u ? { ...u, credits: Math.max(0, u.credits + amount) } : null);
  const claimDailyLogin = () => {
    const today = new Date().toDateString();
    const lastClaim = localStorage.getItem('ck_lastClaim');
    if (lastClaim === today) return false;
    localStorage.setItem('ck_lastClaim', today);
    updateCredits(5);
    setUser(u => u ? { ...u, streak: u.streak + 1 } : null);
    return true;
  };
  const addProject = (project) => setProjects(p => [project, ...p]);
  const isAdmin = user?.email === CONFIG.ADMIN_EMAIL || user?.isAdmin;

  return React.createElement(AuthContext.Provider, { value: { user, login, register, logout, updateCredits, claimDailyLogin, projects, addProject, isAdmin } }, children);
}

function CurrencyProvider({ children }) {
  const [currency, setCurrency] = useState(() => localStorage.getItem('ck_currency') || 'GBP');
  useEffect(() => { localStorage.setItem('ck_currency', currency); }, [currency]);
  const formatPrice = useCallback((gbpAmount, showSymbol = true) => {
    const c = CONFIG.CURRENCIES[currency];
    const converted = Math.round(gbpAmount * c.rate);
    return showSymbol ? `${c.symbol}${converted.toLocaleString()}` : converted;
  }, [currency]);
  return React.createElement(CurrencyContext.Provider, { value: { currency, setCurrency, formatPrice, symbol: CONFIG.CURRENCIES[currency].symbol } }, children);
}

function NotificationProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = 'success') => {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4000);
  }, []);
  return React.createElement(NotificationContext.Provider, { value: { toasts, addToast } }, children);
}

function LoginPage() {
  const { login } = useContext(AuthContext);
  const { addToast } = useContext(NotificationContext);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  useEffect(() => { document.title = 'Log In - Creative Kaygency'; }, []);

  const handleSubmit = (e) => {
    e.preventDefault();
    const result = login(email, password);
    if (result.success) { addToast(`Welcome back, ${result.user.name}!`); location.hash = result.user.isAdmin ? '/admin' : '/dashboard'; }
    else addToast(result.error, 'error');
  };

  return (
    <div className="auth-page"><div className="auth-card">
      <h2>Welcome Back</h2>
      <p className="subtitle">Log in to your Creative Kaygency account</p>
      <div className="demo-hint">🔑 Demo: demo@creative-kaygency.com / demo123<br/>Admin: kieron.b@outlook.com / admin123</div>
      <div className="social-login">
        <button className="social-btn" onClick={() => addToast('Google login coming soon!','warning')}>G  Google</button>
        <button className="social-btn" onClick={() => addToast('GitHub login coming soon!','warning')}>⌥  GitHub</button>
      </div>
      <div className="auth-divider">or continue with email</div>
      <form onSubmit={handleSubmit}>
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" required /></div>
        <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required /></div>
        <button type="submit" className="btn btn-primary btn-block btn-lg">Log In</button>
      </form>
      <div className="auth-footer">Don't have an account? <a href="#/register">Sign Up Free</a></div>
    </div></div>
  );
}

function RegisterPage() {
  const { register: doRegister } = useContext(AuthContext);
  const { addToast } = useContext(NotificationContext);
  const [form, setForm] = useState({ name: '', email: '', password: '', confirm: '', referral: '', terms: false });
  useEffect(() => { document.title = 'Sign Up - Creative Kaygency'; }, []);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (form.password !== form.confirm) return addToast('Passwords do not match', 'error');
    if (!form.terms) return addToast('Please accept the terms', 'error');
    const result = doRegister(form.name, form.email, form.password, form.referral);
    if (result.success) { addToast(`Welcome to Creative Kaygency, ${form.name}! 🎉`); location.hash = '/dashboard'; }
    else addToast(result.error, 'error');
  };
  const u = (field, val) => setForm(f => ({ ...f, [field]: val }));

  return (
    <div className="auth-page"><div className="auth-card">
      <h2>Create Your Account</h2>
      <p className="subtitle">Join 500+ businesses growing with Creative Kaygency</p>
      <form onSubmit={handleSubmit}>
        <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" value={form.name} onChange={e => u('name',e.target.value)} placeholder="John Smith" required /></div>
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={form.email} onChange={e => u('email',e.target.value)} placeholder="you@example.com" required /></div>
        <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" value={form.password} onChange={e => u('password',e.target.value)} placeholder="Min 8 characters" required minLength="8" /></div>
        <div className="form-group"><label className="form-label">Confirm Password</label><input className="form-input" type="password" value={form.confirm} onChange={e => u('confirm',e.target.value)} placeholder="••••••••" required /></div>
        <div className="form-group"><label className="form-label">Referral Code (optional)</label><input className="form-input" value={form.referral} onChange={e => u('referral',e.target.value)} placeholder="Enter referral code for 50 bonus credits" /></div>
        <label className="form-checkbox" style={{marginBottom:20}}><input type="checkbox" checked={form.terms} onChange={e => u('terms',e.target.checked)} /><span>I agree to the <a href="#/terms" style={{color:'var(--primary)'}}>Terms of Service</a> and <a href="#/privacy" style={{color:'var(--primary)'}}>Privacy Policy</a></span></label>
        <button type="submit" className="btn btn-primary btn-block btn-lg">Create Account →</button>
      </form>
      <div className="auth-footer">Already have an account? <a href="#/login">Log In</a></div>
    </div></div>
  );
}

function DashboardPage() {
  const { user, updateCredits, claimDailyLogin, projects, isAdmin } = useContext(AuthContext);
  const { formatPrice } = useContext(CurrencyContext);
  const { addToast } = useContext(NotificationContext);
  const [tab, setTab] = useState('overview');

  useEffect(() => {
    document.title = 'Dashboard - Creative Kaygency';
    const h = window.location.hash;
    if (h.includes('/dashboard/credits')) setTab('credits');
    else if (h.includes('/dashboard/book')) setTab('book');
    else if (h.includes('/dashboard/rewards')) setTab('rewards');
    else if (h.includes('/dashboard/referrals')) setTab('referrals');
    else if (h.includes('/dashboard/projects')) setTab('projects');
    else if (h.includes('/dashboard/settings')) setTab('settings');
  }, []);

  if (!user) { location.hash = '/login'; return null; }

  const handleDailyClaim = () => {
    const claimed = claimDailyLogin();
    if (claimed) addToast('🎉 +5 credits claimed! Keep your streak going!');
    else addToast('You\'ve already claimed today\'s reward!', 'warning');
  };

  const sideItems = [
    { id: 'overview', icon: '📊', label: 'Overview' },
    { id: 'projects', icon: '📁', label: 'My Projects' },
    { id: 'book', icon: '🛒', label: 'Book Service' },
    { id: 'credits', icon: '💰', label: 'Credits' },
    { id: 'rewards', icon: '🎮', label: 'Rewards' },
    { id: 'referrals', icon: '🤝', label: 'Referrals' },
    { id: 'settings', icon: '⚙️', label: 'Settings' },
  ];

  return (
    <div className="dashboard-layout">
      <aside className="dashboard-sidebar">
        <div style={{marginBottom:16,padding:'0 14px'}}><div style={{fontSize:13,color:'var(--gray-400)'}}>Welcome back,</div><div style={{fontSize:16,fontWeight:700}}>{user.name}</div></div>
        <nav className="sidebar-nav">
          {sideItems.map(item => <button key={item.id} className={`sidebar-link${tab === item.id ? ' active' : ''}`} onClick={() => { setTab(item.id); location.hash = `/dashboard/${item.id === 'overview' ? '' : item.id}`; }}><span className="icon">{item.icon}</span>{item.label}</button>)}
        </nav>
        {isAdmin && <><div className="sidebar-section-title">Admin</div><a href="#/admin" className="sidebar-link"><span className="icon">🔑</span>Admin Panel</a></>}
      </aside>
      <main className="dashboard-content">
        {tab === 'overview' && <DashOverview user={user} projects={projects} formatPrice={formatPrice} onClaim={handleDailyClaim} />}
        {tab === 'projects' && <DashProjects projects={projects} />}
        {tab === 'book' && <DashBookService />}
        {tab === 'credits' && <DashCredits user={user} formatPrice={formatPrice} />}
        {tab === 'rewards' && <DashRewards user={user} onClaim={handleDailyClaim} />}
        {tab === 'referrals' && <DashReferrals user={user} />}
        {tab === 'settings' && <DashSettings user={user} />}
      </main>
    </div>
  );
}

function BookingWizard({ service }) {
  const { user, updateCredits, addProject } = useContext(AuthContext);
  const { formatPrice } = useContext(CurrencyContext);
  const { addToast } = useContext(NotificationContext);
  const [step, setStep] = useState(1);
  const [formData, setFormData] = useState({});
  const [payMethod, setPayMethod] = useState('credits');

  if (!user) { location.hash = '/login'; return null; }
  if (!service) return null;

  const savings = Math.round((1 - service.creditMin / service.cashMin) * 100);
  const creditPrice = service.creditMin;
  const cashPrice = service.cashMin;

  const handleBook = () => {
    if (payMethod === 'credits') {
      if (user.credits < creditPrice) { addToast('Insufficient credits. Please buy more or pay cash.', 'error'); return; }
      updateCredits(-creditPrice);
    }
    addProject({ id: 'prj_' + Date.now(), service: service.id, status: 'pending', date: new Date().toISOString().split('T')[0], paid: payMethod, amount: payMethod === 'credits' ? creditPrice : cashPrice, formData });
    addToast(`🎉 ${service.name} booked successfully!`);
    setStep(4);
  };

  const formFieldMap = {
    pages: { label: 'Number of Pages', type: 'select', options: ['1-3','4-6','7-10','10+'] },
    features: { label: 'Required Features', type: 'textarea', placeholder: 'List the features you need...' },
    competitors: { label: 'Competitor Websites', type: 'textarea', placeholder: 'Links to competitor websites for reference...' },
    timeline: { label: 'Preferred Timeline', type: 'select', options: ['ASAP','1-2 weeks','2-4 weeks','Flexible'] },
    brandColors: { label: 'Brand Colours', type: 'text', placeholder: 'e.g., Blue, White, Gold' },
    style: { label: 'Design Style', type: 'select', options: ['Modern/Minimal','Bold/Vibrant','Elegant/Luxury','Playful/Fun','Corporate/Professional'] },
    colors: { label: 'Colour Preferences', type: 'text', placeholder: 'Preferred colours...' },
    inspiration: { label: 'Inspiration / References', type: 'textarea', placeholder: 'Links or descriptions of designs you like...' },
    industry: { label: 'Industry / Niche', type: 'text', placeholder: 'e.g., Health & Wellness' },
    goal: { label: 'Primary Goal', type: 'select', options: ['Lead generation','Sales','Signups','Information','Brand awareness'] },
    targetAudience: { label: 'Target Audience', type: 'text', placeholder: 'Who is this for?' },
    website: { label: 'Website URL', type: 'text', placeholder: 'https://...' },
    keywords: { label: 'Target Keywords', type: 'textarea', placeholder: 'List your target keywords...' },
    platform: { label: 'Platform', type: 'select', options: ['WordPress','Shopify','WooCommerce','Custom','Other'] },
    products: { label: 'Product Details', type: 'textarea', placeholder: 'Describe your products...' },
    niche: { label: 'Niche / Topic', type: 'text', placeholder: 'Your niche or topic...' },
    tone: { label: 'Brand Voice / Tone', type: 'select', options: ['Professional','Casual','Friendly','Authoritative','Witty'] },
    quantity: { label: 'Quantity Needed', type: 'select', options: ['5','10','20','30','50+'] },
    topic: { label: 'Topic / Subject', type: 'text', placeholder: 'Main topic or subject...' },
    concept: { label: 'Concept Description', type: 'textarea', placeholder: 'Describe your idea in detail...' },
  };

  return (
    <div>
      <div className="wizard-steps">
        {['Details','Requirements','Payment','Confirmation'].map((s, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div className={`wizard-connector${step > i ? ' done' : ''}`}/>}
            <div className={`wizard-step${step === i + 1 ? ' active' : step > i + 1 ? ' done' : ''}`}>
              <div className="num">{step > i + 1 ? '✓' : i + 1}</div>{s}
            </div>
          </React.Fragment>
        ))}
      </div>

      {step === 1 && <div className="card" style={{maxWidth:700,margin:'0 auto'}}>
        <div style={{display:'flex',gap:16,marginBottom:20}}>
          <div style={{fontSize:40}}>{service.icon}</div>
          <div><h2 style={{fontSize:22}}>{service.name}</h2><div className="badge badge-primary">{CATEGORIES.find(c => c.id === service.category)?.name}</div></div>
        </div>
        <p style={{color:'var(--gray-600)',marginBottom:16}}>{service.desc}</p>
        <div style={{display:'flex',gap:16,marginBottom:16}}>
          <div style={{flex:1,padding:12,background:'var(--gradient-subtle)',borderRadius:'var(--radius)'}}><div style={{fontSize:12,color:'var(--primary)'}}>Credits</div><div style={{fontSize:18,fontWeight:700,color:'var(--primary)'}}>{service.creditMin}–{service.creditMax}</div></div>
          <div style={{flex:1,padding:12,background:'var(--gray-50)',borderRadius:'var(--radius)'}}><div style={{fontSize:12,color:'var(--gray-500)'}}>Cash</div><div style={{fontSize:18,fontWeight:700,color:'var(--gray-700)'}}>{formatPrice(service.cashMin)}–{formatPrice(service.cashMax)}</div></div>
        </div>
        <button className="btn btn-primary btn-block" onClick={() => setStep(2)}>Continue →</button>
      </div>}

      {step === 2 && <div className="card" style={{maxWidth:700,margin:'0 auto'}}>
        <h3 style={{marginBottom:16}}>Project Requirements</h3>
        {(service.formFields || ['features','timeline','style']).map(field => {
          const f = formFieldMap[field] || { label: field, type: 'text', placeholder: '' };
          return (
            <div key={field} className="form-group">
              <label className="form-label">{f.label}</label>
              {f.type === 'textarea' ? <textarea className="form-textarea" placeholder={f.placeholder} value={formData[field] || ''} onChange={e => setFormData({...formData, [field]: e.target.value})} />
              : f.type === 'select' ? <select className="form-select" value={formData[field] || ''} onChange={e => setFormData({...formData, [field]: e.target.value})}><option value="">Select...</option>{f.options.map(o => <option key={o} value={o}>{o}</option>)}</select>
              : <input className="form-input" type="text" placeholder={f.placeholder} value={formData[field] || ''} onChange={e => setFormData({...formData, [field]: e.target.value})} />}
            </div>
          );
        })}
        <div style={{display:'flex',gap:12}}><button className="btn btn-ghost" onClick={() => setStep(1)}>← Back</button><button className="btn btn-primary" style={{flex:1}} onClick={() => setStep(3)}>Continue to Payment →</button></div>
      </div>}

      {step === 3 && <div className="card" style={{maxWidth:700,margin:'0 auto'}}>
        <h3 style={{marginBottom:16}}>Choose Payment Method</h3>
        <div className="payment-options">
          <div className={`payment-option${payMethod === 'credits' ? ' selected' : ''}`} onClick={() => setPayMethod('credits')}>
            <div className="save-badge">Save {savings}%</div>
            <div className="method-icon">🪙</div>
            <div className="method-name">Pay with Credits</div>
            <div className="method-price">{creditPrice} credits</div>
            <div className="method-detail">Balance: {user.credits.toLocaleString()}</div>
            {user.credits < creditPrice && <div style={{color:'var(--error)',fontSize:12,marginTop:4}}>Insufficient credits</div>}
          </div>
          <div className={`payment-option${payMethod === 'card' ? ' selected' : ''}`} onClick={() => setPayMethod('card')}>
            <div className="method-icon">💳</div>
            <div className="method-name">Credit / Debit Card</div>
            <div className="method-price">{formatPrice(cashPrice)}</div>
            <div className="method-detail">Via Stripe</div>
          </div>
          <div className={`payment-option${payMethod === 'paypal' ? ' selected' : ''}`} onClick={() => setPayMethod('paypal')}>
            <div className="method-icon">🅿️</div>
            <div className="method-name">PayPal</div>
            <div className="method-price">{formatPrice(cashPrice)}</div>
            <div className="method-detail">Secure checkout</div>
          </div>
        </div>
        {user.plan && <div style={{marginTop:12,padding:12,background:'var(--success-light)',borderRadius:'var(--radius)',fontSize:13}}><strong>✨ {user.plan.charAt(0).toUpperCase() + user.plan.slice(1)} Plan</strong> — You have priority queue access!</div>}
        {!user.plan && <div style={{marginTop:12,padding:12,background:'var(--info-light)',borderRadius:'var(--radius)',fontSize:13}}>💡 <strong>Subscribe</strong> for better rates and priority queue. <a href="#/pricing" style={{color:'var(--primary)',fontWeight:600}}>View Plans</a></div>}
        <div style={{display:'flex',gap:12,marginTop:20}}><button className="btn btn-ghost" onClick={() => setStep(2)}>← Back</button><button className="btn btn-primary" style={{flex:1}} onClick={handleBook}>Confirm & Book →</button></div>
      </div>}

      {step === 4 && <div className="card" style={{maxWidth:700,margin:'0 auto',textAlign:'center'}}>
        <div style={{fontSize:64,marginBottom:12}}>🎉</div>
        <h2>Booking Confirmed!</h2>
        <p style={{color:'var(--gray-500)',marginBottom:20}}>{service.name} has been booked. We'll start working on it right away.</p>
        <div style={{background:'var(--gray-50)',borderRadius:'var(--radius)',padding:16,marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span>Service</span><strong>{service.name}</strong></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}><span>Payment</span><strong>{payMethod === 'credits' ? `${creditPrice} credits` : formatPrice(cashPrice)}</strong></div>
          <div style={{display:'flex',justifyContent:'space-between'}}><span>Status</span><span className="badge badge-warning">Pending Review</span></div>
        </div>
        <a href="#/dashboard/projects" className="btn btn-primary">View My Projects →</a>
      </div>}
    </div>
  );
}

// ROUTER & APP

function useHashRoute() {
  const [hash, setHash] = useState(window.location.hash.slice(1) || '/');
  useEffect(() => {
    const handler = () => { setHash(window.location.hash.slice(1) || '/'); window.scrollTo(0, 0); };
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return hash;
}

function App() {
  const route = useHashRoute();
  const path = route.split('?')[0];

  let page;
  if (path === '/' || path === '') page = <HomePage />;
  else if (path === '/services') page = <ServicesPage />;
  else if (path.startsWith('/services/')) page = <ServiceDetailPage serviceId={path.split('/services/')[1]} />;
  else if (path.startsWith('/book/')) page = <BookServicePage serviceId={path.split('/book/')[1]} />;
  else if (path === '/portfolio') page = <PortfolioPage />;
  else if (path === '/pricing') page = <PricingPage />;
  else if (path === '/blog') page = <BlogPage />;
  else if (path.startsWith('/blog/')) page = <BlogPostPage slug={path.split('/blog/')[1]} />;
  else if (path === '/login') page = <LoginPage />;
  else if (path === '/register') page = <RegisterPage />;
  else if (path.startsWith('/dashboard')) page = <DashboardPage />;
  else if (path.startsWith('/admin')) page = <AdminPage />;
  else if (path === '/about') page = <AboutPage />;
  else if (path === '/contact') page = <ContactPage />;
  else if (path === '/faq') page = <FAQPage />;
  else if (path === '/knowledge') page = <KnowledgePage />;
  else page = <NotFoundPage />;

  const isDashboard = path.startsWith('/dashboard') || path.startsWith('/admin');

  return (
    <AuthProvider>
      <CurrencyProvider>
        <NotificationProvider>
          <div>
            <AnnouncementBar />
            <Navbar />
            <Toasts />
            <main style={{minHeight: isDashboard ? 'auto' : 'calc(100vh - 200px)'}}>
              {page}
            </main>
            {!isDashboard && <Footer />}
          </div>
        </NotificationProvider>
      </CurrencyProvider>
    </AuthProvider>
  );
}

// RENDER

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
